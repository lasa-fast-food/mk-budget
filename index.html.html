<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>MK Budget 2026</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22MK%20Budget%202026%22,%22short_name%22:%22MKBudget%22,%22display%22:%22standalone%22,%22background_color%22:%22%231a1a2e%22,%22theme_color%22:%22%231a1a2e%22}">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --border: #2d2d4a;
    --accent: #7c3aed;
    --accent-light: #a78bfa;
    --income: #10b981;
    --income-light: #6ee7b7;
    --expense: #ef4444;
    --expense-light: #fca5a5;
    --tax: #f59e0b;
    --owners: #3b82f6;
    --profit: #8b5cf6;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; font-weight: 600;
    color: var(--accent-light);
    letter-spacing: -0.5px;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .year-badge {
    background: var(--accent);
    color: white; border-radius: 20px;
    padding: 4px 12px; font-size: 12px; font-weight: 600;
  }

  /* sync badge */
  .sync-badge {
    border-radius: 20px; padding: 4px 10px;
    font-size: 11px; font-weight: 600;
    transition: all .4s;
  }
  .sync-badge.syncing { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
  .sync-badge.saved   { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
  .sync-badge.offline { background: rgba(239,68,68,.15);  color: #ef4444; border: 1px solid rgba(239,68,68,.3); }

  /* ===== MONTH TABS ===== */
  .month-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; white-space: nowrap;
    padding: 0 24px;
    scrollbar-width: none;
  }
  .month-nav::-webkit-scrollbar { display: none; }
  .month-tab {
    display: inline-block;
    padding: 12px 16px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px; font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .month-tab:hover { color: var(--text); }
  .month-tab.active {
    color: var(--accent-light);
    border-bottom-color: var(--accent-light);
  }
  .month-tab .month-indicator {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--income);
    margin-left: 6px; vertical-align: middle;
    opacity: 0;
  }
  .month-tab.has-data .month-indicator { opacity: 1; }

  /* ===== MAIN LAYOUT ===== */
  .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* ===== SUMMARY CARDS ===== */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .summary-card .label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-dim); margin-bottom: 8px;
  }
  .summary-card .amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 600;
    color: var(--text);
  }
  .summary-card .sub {
    font-size: 11px; color: var(--text-dim); margin-top: 4px;
  }
  .summary-card.income .amount { color: var(--income); }
  .summary-card.remaining .amount { color: var(--accent-light); }
  .summary-card.remaining.negative .amount { color: var(--expense); }

  /* ===== PROFIT FIRST ===== */
  .pf-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px; margin-bottom: 24px;
  }
  .section-title {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 16px;
  }
  .pf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .pf-card {
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }
  .pf-card.owners { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.3); }
  .pf-card.opex   { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); }
  .pf-card.tax    { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); }
  .pf-card.profit { background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.3); }
  .pf-card .pf-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .pf-card.owners .pf-label { color: var(--owners); }
  .pf-card.opex   .pf-label { color: var(--income); }
  .pf-card.tax    .pf-label { color: var(--tax); }
  .pf-card.profit .pf-label { color: var(--profit); }
  .pf-card .pf-pct { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
  .pf-card .pf-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px; font-weight: 600; color: var(--text);
  }

  /* ===== EXPENSE COLS ===== */
  .expense-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 24px;
  }
  @media (max-width: 700px) { .expense-cols { grid-template-columns: 1fr; } }

  .expense-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-header .panel-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
  .panel-header .panel-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600; color: var(--expense);
  }

  .expense-list { padding: 8px 0; }
  .expense-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 18px;
    transition: background 0.1s;
  }
  .expense-item:hover { background: rgba(255,255,255,0.03); }
  .expense-item .item-name { color: var(--text); font-size: 13px; }

  .add-item-row {
    display: flex; gap: 8px; padding: 12px 18px;
    border-top: 1px solid var(--border);
  }
  .add-item-row input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 8px 12px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    outline: none;
  }
  .add-item-row input:focus { border-color: var(--accent); }
  .add-item-row input::placeholder { color: var(--text-dim); }
  .btn-add {
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); padding: 8px 14px;
    cursor: pointer; font-size: 18px; line-height: 1;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #6d28d9; }

  /* ===== INCOME SECTION ===== */
  .income-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px; margin-bottom: 24px;
  }
  .income-row {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 10px;
  }
  .income-row label { width: 130px; font-size: 13px; color: var(--text-muted); flex-shrink: 0; }
  .income-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 14px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 14px;
    outline: none; width: 180px;
  }
  .income-input:focus { border-color: var(--income); }

  /* ===== PF SLIDERS ===== */
  .pf-row {
    display: flex; align-items: center; gap: 16px; margin-bottom: 12px;
  }
  .pf-row label { width: 110px; font-size: 13px; color: var(--text-muted); }
  .pf-row input[type=range] { flex: 1; accent-color: var(--accent); }
  .pf-row .pf-val {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
    color: var(--accent-light); width: 40px; text-align: right;
  }
  .pf-total-check { font-size: 12px; color: var(--text-dim); text-align: right; margin-top: 4px; }
  .pf-total-check.ok { color: var(--income); }
  .pf-total-check.bad { color: var(--expense); }

  /* ===== RECON TABLE ===== */
  .recon-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden; margin-bottom: 24px;
  }
  .recon-table { width: 100%; border-collapse: collapse; }
  .recon-table td {
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .recon-table td:last-child {
    text-align: right;
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
  }
  .recon-table tr:last-child td { border-bottom: none; }
  .recon-table .recon-label { color: var(--text-muted); }
  .recon-table .recon-total td { font-weight: 700; background: rgba(255,255,255,0.03); }
  .recon-positive { color: var(--income) !important; }
  .recon-negative { color: var(--expense) !important; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; min-width: 320px; max-width: 420px; width: 90%;
  }
  .modal h3 { margin-bottom: 16px; font-size: 15px; }
  .modal label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; margin-top: 12px; }
  .modal input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 14px;
    color: var(--text); font-size: 14px; outline: none;
    font-family: 'JetBrains Mono', monospace;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
  .btn { padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-danger  { background: var(--expense); color: white; }
  .btn-ghost   { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn:hover { opacity: 0.85; }

  /* ===== SAVE BANNER ===== */
  .save-banner {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--income); color: #022c22;
    border-radius: var(--radius); padding: 10px 18px;
    font-size: 13px; font-weight: 600;
    transform: translateY(80px); opacity: 0;
    transition: all 0.3s; z-index: 300;
  }
  .save-banner.show { transform: translateY(0); opacity: 1; }

  .empty-state { text-align: center; padding: 20px; color: var(--text-dim); font-size: 13px; }

  /* ===== INLINE EXPENSE EDIT ===== */
  .item-inline-edit { display: flex; align-items: center; gap: 4px; }
  .item-currency { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }
  .inline-amount-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px;
    color: var(--expense-light);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 500;
    width: 90px; text-align: right; outline: none;
    -moz-appearance: textfield;
  }
  .inline-amount-input::-webkit-outer-spin-button,
  .inline-amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .inline-amount-input:focus { border-color: var(--accent); background: #1e1e35; }
  .inline-amount-input::placeholder { color: var(--text-dim); }
  .btn-delete-inline {
    background: transparent; border: none;
    color: var(--text-dim); cursor: pointer;
    font-size: 11px; padding: 4px 5px;
    border-radius: 4px; line-height: 1;
    transition: color 0.15s, background 0.15s;
  }
  .btn-delete-inline:hover { color: var(--expense); background: rgba(239,68,68,0.1); }
  .expense-item { cursor: default; }
</style>
</head>
<body>

<div class="app-header">
  <h1>💰 MK Budget</h1>
  <div class="header-right">
    <span class="sync-badge syncing" id="syncBadge">⟳ Syncing</span>
    <span class="year-badge">2026</span>
    <button class="btn btn-ghost" onclick="exportCSV()" style="font-size:12px;padding:6px 12px;">⬇ Export</button>
  </div>
</div>

<nav class="month-nav" id="monthNav"></nav>
<div class="main" id="mainContent"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h3 id="modalTitle">Edit Item</h3>
    <div id="modalBody"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<div class="save-banner" id="saveBanner">✓ Saved</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://owwjslrpxtkfuhbratzk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93d2pzbHJweHRrZnVoYnJhdHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTg3MTc1MDIsImV4cCI6MjAzNDI5MzUwMn0.Ry9JFMbjMwBh0pOzOFMqVkE5GHmVVAVVq3bCxCxgNag';
const SB_TABLE = 'mk_budget_2026';
const YEAR = '2026';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

// ═══════════════════════════════════════════════════════
// DEFAULTS — your actual expense lists
// ═══════════════════════════════════════════════════════
const DEFAULT_FIXED = [
  {name:'Rent',              amount: 4000},
  {name:'Zanele',            amount: 2500},
  {name:'Groceries',         amount: 3000},
  {name:'Electricity',       amount:  450},
  {name:'Capitec Funeral Cover', amount: 72},
  {name:'Stokfel (Ayanda)',  amount:    0},
];
const DEFAULT_VARIABLE = [
  {name:'Ayanda Mbatha',        amount: 0},
  {name:'Dumsani',              amount: 0},
  {name:'Naledi Tuck Shop',     amount: 0},
  {name:'Petty Cash',           amount: 0},
  {name:'Supersonic',           amount: 0},
  {name:'ZAH - Makhi Boichoko', amount: 0},
  {name:'Archa - Filisi',       amount: 0},
];

function defaultMonth() {
  return {
    salary: 0, income1: 0, income2: 0,
    pfOwners: 35, pfOpEx: 40, pfTax: 15, pfProfit: 10,
    fixed:    DEFAULT_FIXED.map(i => ({...i})),
    variable: DEFAULT_VARIABLE.map(i => ({...i})),
  };
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = { months: {}, activeMonth: new Date().getMonth() };
let _syncTimeout = null;

// ═══════════════════════════════════════════════════════
// SUPABASE SYNC
// ═══════════════════════════════════════════════════════
function setSyncBadge(status) {
  const b = document.getElementById('syncBadge');
  if (!b) return;
  if (status === 'syncing') { b.className = 'sync-badge syncing'; b.textContent = '⟳ Syncing'; }
  if (status === 'saved')   { b.className = 'sync-badge saved';   b.textContent = '✓ Synced'; }
  if (status === 'offline') { b.className = 'sync-badge offline'; b.textContent = '⚠ Offline'; }
}

async function loadFromCloud() {
  setSyncBadge('syncing');
  try {
    const { data: row, error } = await sb
      .from(SB_TABLE)
      .select('payload')
      .eq('id', 'main')
      .maybeSingle();

    if (error) throw error;

    if (row && row.payload) {
      state = row.payload;
      // Make sure all 12 months exist
      for (let m = 0; m < 12; m++) {
        if (!state.months[m]) state.months[m] = defaultMonth();
      }
    } else {
      // No cloud record yet — try localStorage fallback
      const local = localStorage.getItem('mk_budget_2026');
      if (local) { try { state = JSON.parse(local); } catch(e){} }
      for (let m = 0; m < 12; m++) {
        if (!state.months[m]) state.months[m] = defaultMonth();
      }
    }
    setSyncBadge('saved');
  } catch(e) {
    console.warn('Cloud load failed, using local:', e.message);
    setSyncBadge('offline');
    const local = localStorage.getItem('mk_budget_2026');
    if (local) { try { state = JSON.parse(local); } catch(ex){} }
    for (let m = 0; m < 12; m++) {
      if (!state.months[m]) state.months[m] = defaultMonth();
    }
  }
  renderMonthNav();
  renderMain();
}

async function saveToCloud() {
  // Always save to localStorage immediately
  localStorage.setItem('mk_budget_2026', JSON.stringify(state));

  // Debounce cloud save by 800ms to avoid hammering on rapid input
  clearTimeout(_syncTimeout);
  setSyncBadge('syncing');
  _syncTimeout = setTimeout(async () => {
    try {
      const { error } = await sb
        .from(SB_TABLE)
        .upsert({ id: 'main', payload: state, updated_at: new Date().toISOString() });
      if (error) throw error;
      setSyncBadge('saved');
    } catch(e) {
      console.warn('Cloud save failed:', e.message);
      setSyncBadge('offline');
    }
  }, 800);

  // Show local save banner immediately
  const banner = document.getElementById('saveBanner');
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 1800);
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function getMonth() { return state.months[state.activeMonth]; }

function calc(d) {
  const income = (parseFloat(d.salary)||0) + (parseFloat(d.income1)||0) + (parseFloat(d.income2)||0);
  const owners  = income * (d.pfOwners / 100);
  const opex    = income * (d.pfOpEx   / 100);
  const tax     = income * (d.pfTax    / 100);
  const profit  = income * (d.pfProfit / 100);
  // toUse = OpEx allocation only (Profit First: Owner's Pay, Tax & Profit go to separate accounts)
  const toUse   = opex;
  const fixedTotal    = d.fixed.reduce((s,i)    => s + (parseFloat(i.amount)||0), 0);
  const variableTotal = d.variable.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
  const totalExp  = fixedTotal + variableTotal;
  const remaining = toUse - totalExp;
  return { income, owners, opex, tax, profit, toUse, fixedTotal, variableTotal, totalExp, remaining };
}

function fmt(n) {
  return 'R ' + (parseFloat(n)||0).toLocaleString('en-ZA', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtShort(n) {
  return 'R ' + (parseFloat(n)||0).toLocaleString('en-ZA', {minimumFractionDigits:0, maximumFractionDigits:0});
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderMonthNav() {
  const nav = document.getElementById('monthNav');
  nav.innerHTML = MONTHS.map((m, i) => {
    const d = state.months[i];
    const hasData = d && ((parseFloat(d.salary)||0) + (parseFloat(d.income1)||0) + (parseFloat(d.income2)||0)) > 0;
    return `<div class="month-tab${i === state.activeMonth ? ' active' : ''}${hasData ? ' has-data' : ''}"
      onclick="switchMonth(${i})">${m}<span class="month-indicator"></span></div>`;
  }).join('');
}

function renderMain() {
  const d = getMonth();
  const c = calc(d);
  const pfTotal = d.pfOwners + d.pfOpEx + d.pfTax + d.pfProfit;

  document.getElementById('mainContent').innerHTML = `
    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card income">
        <div class="label">Total Income</div>
        <div class="amount">${fmtShort(c.income)}</div>
        <div class="sub">${MONTHS[state.activeMonth]} ${YEAR}</div>
      </div>
      <div class="summary-card">
        <div class="label">OpEx Budget (${d.pfOpEx}%)</div>
        <div class="amount">${fmtShort(c.toUse)}</div>
        <div class="sub">Available for expenses</div>
      </div>
      <div class="summary-card">
        <div class="label">Total Expenses</div>
        <div class="amount" style="color:var(--expense)">${fmtShort(c.totalExp)}</div>
        <div class="sub">Fixed + Variable</div>
      </div>
      <div class="summary-card remaining${c.remaining < 0 ? ' negative' : ''}">
        <div class="label">Remaining</div>
        <div class="amount">${fmtShort(c.remaining)}</div>
        <div class="sub">${c.remaining >= 0 ? '✓ In budget' : '⚠ Over budget'}</div>
      </div>
    </div>

    <!-- Income -->
    <div class="income-section">
      <div class="section-title">Income</div>
      <div class="income-row">
        <label>Salary</label>
        <input class="income-input" type="text" inputmode="decimal"
          value="${d.salary || ''}" placeholder="e.g. 30000"
          onchange="updateIncome('salary', this.value)">
      </div>
      <div class="income-row">
        <label>Paycheque (1st)</label>
        <input class="income-input" type="text" inputmode="decimal"
          value="${d.income1 || ''}" placeholder="e.g. 15000"
          onchange="updateIncome('income1', this.value)">
      </div>
      <div class="income-row">
        <label>Paycheque (2nd)</label>
        <input class="income-input" type="text" inputmode="decimal"
          value="${d.income2 || ''}" placeholder="e.g. 15000"
          onchange="updateIncome('income2', this.value)">
      </div>
      <div style="margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--income);font-weight:600;">
        Total: ${fmt(c.income)}
      </div>
    </div>

    <!-- Profit First Allocations -->
    <div class="pf-section">
      <div class="section-title">Profit First Allocations</div>
      <div class="pf-grid">
        <div class="pf-card owners">
          <div class="pf-label">Owner's Pay</div>
          <div class="pf-pct">${d.pfOwners}%</div>
          <div class="pf-amount">${fmtShort(c.owners)}</div>
        </div>
        <div class="pf-card opex">
          <div class="pf-label">Op Expenses</div>
          <div class="pf-pct">${d.pfOpEx}%</div>
          <div class="pf-amount">${fmtShort(c.opex)}</div>
        </div>
        <div class="pf-card tax">
          <div class="pf-label">Tax</div>
          <div class="pf-pct">${d.pfTax}%</div>
          <div class="pf-amount">${fmtShort(c.tax)}</div>
        </div>
        <div class="pf-card profit">
          <div class="pf-label">Profit First</div>
          <div class="pf-pct">${d.pfProfit}%</div>
          <div class="pf-amount">${fmtShort(c.profit)}</div>
        </div>
      </div>
      <div style="margin-top:16px;">
        <div class="section-title" style="margin-bottom:10px;">Adjust Percentages</div>
        ${renderSlider('pfOwners', "Owner's Pay", d.pfOwners)}
        ${renderSlider('pfOpEx',   'Op Expenses', d.pfOpEx)}
        ${renderSlider('pfTax',    'Tax',         d.pfTax)}
        ${renderSlider('pfProfit', 'Profit First',d.pfProfit)}
        <div class="pf-total-check ${pfTotal === 100 ? 'ok' : 'bad'}">
          Allocations total: ${pfTotal}% ${pfTotal === 100 ? '✓' : '⚠ must equal 100%'}
        </div>
      </div>
    </div>

    <!-- Expenses -->
    <div class="expense-cols">
      <div class="expense-panel">
        <div class="panel-header">
          <span class="panel-title">Fixed Expenses</span>
          <span class="panel-total">${fmtShort(c.fixedTotal)}</span>
        </div>
        <div class="expense-list" id="fixedList">${renderExpenseItems(d.fixed, 'fixed')}</div>
        <div class="add-item-row">
          <input type="text" id="fixedName" placeholder="Item name…">
          <button class="btn-add" onclick="addItem('fixed')">+</button>
        </div>
      </div>
      <div class="expense-panel">
        <div class="panel-header">
          <span class="panel-title">Variable Expenses</span>
          <span class="panel-total">${fmtShort(c.variableTotal)}</span>
        </div>
        <div class="expense-list" id="variableList">${renderExpenseItems(d.variable, 'variable')}</div>
        <div class="add-item-row">
          <input type="text" id="variableName" placeholder="Item name…">
          <button class="btn-add" onclick="addItem('variable')">+</button>
        </div>
      </div>
    </div>

    <!-- Reconciliation -->
    <div class="recon-section">
      <div class="panel-header">
        <span class="panel-title">Monthly Reconciliation</span>
      </div>
      <table class="recon-table">
        <tr><td class="recon-label">Total Income</td><td style="color:var(--income)">${fmt(c.income)}</td></tr>
        <tr><td class="recon-label">Owner's Pay (${d.pfOwners}%)</td><td style="color:var(--owners)">– ${fmt(c.owners)}</td></tr>
        <tr><td class="recon-label">Tax (${d.pfTax}%)</td><td style="color:var(--tax)">– ${fmt(c.tax)}</td></tr>
        <tr><td class="recon-label">Profit First (${d.pfProfit}%)</td><td style="color:var(--profit)">– ${fmt(c.profit)}</td></tr>
        <tr class="recon-total"><td>Op Expenses Budget (${d.pfOpEx}%)</td><td>${fmt(c.toUse)}</td></tr>
        <tr><td class="recon-label">Fixed Expenses</td><td style="color:var(--expense-light)">– ${fmt(c.fixedTotal)}</td></tr>
        <tr><td class="recon-label">Variable Expenses</td><td style="color:var(--expense-light)">– ${fmt(c.variableTotal)}</td></tr>
        <tr class="recon-total">
          <td>${c.remaining >= 0 ? '✓ Remaining' : '⚠ Over Budget'}</td>
          <td class="${c.remaining >= 0 ? 'recon-positive' : 'recon-negative'}">${fmt(c.remaining)}</td>
        </tr>
      </table>
    </div>
  `;
}

function renderSlider(key, label, val) {
  return `<div class="pf-row">
    <label>${label}</label>
    <input type="range" min="0" max="60" value="${val}" oninput="updatePF('${key}', this.value)">
    <span class="pf-val">${val}%</span>
  </div>`;
}

function renderExpenseItems(list, type) {
  if (!list.length) return '<div class="empty-state">No items yet</div>';
  return list.map((item, i) => `
    <div class="expense-item">
      <span class="item-name">${item.name}</span>
      <div class="item-inline-edit">
        <span class="item-currency">R</span>
        <input class="inline-amount-input"
          type="text" inputmode="decimal"
          value="${item.amount || ''}"
          placeholder="0"
          oninput="updateExpenseAmount('${type}', ${i}, this.value)"
          onblur="saveToCloud()"
          title="${item.name}">
        <button class="btn-delete-inline" onclick="deleteItemDirect('${type}', ${i})" title="Delete">✕</button>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function switchMonth(m) {
  state.activeMonth = m;
  renderMonthNav();
  renderMain();
}

function updateIncome(key, val) {
  const clean = String(val).replace(/[^\d.]/g, '');
  getMonth()[key] = parseFloat(clean) || 0;
  saveToCloud();
  renderMonthNav();
  renderMain();
}

function updatePF(key, val) {
  getMonth()[key] = parseInt(val) || 0;
  saveToCloud();
  renderMain();
}

function addItem(type) {
  const input = document.getElementById(type + 'Name');
  const name = input.value.trim();
  if (!name) return;
  getMonth()[type].push({ name, amount: 0 });
  input.value = '';
  saveToCloud();
  renderMain();
}

function updateExpenseAmount(type, idx, val) {
  getMonth()[type][idx].amount = parseFloat(val) || 0;
  // Live update totals without full re-render (to preserve input focus)
  const c = calc(getMonth());
  const panels = document.querySelectorAll('.panel-total');
  if (panels[0]) panels[0].textContent = fmtShort(c.fixedTotal);
  if (panels[1]) panels[1].textContent = fmtShort(c.variableTotal);
  const cards = document.querySelectorAll('.summary-card .amount');
  if (cards[0]) cards[0].textContent = fmtShort(c.income);
  if (cards[1]) cards[1].textContent = fmtShort(c.toUse);
  if (cards[2]) cards[2].textContent = fmtShort(c.totalExp);
  if (cards[3]) {
    cards[3].textContent = fmtShort(c.remaining);
    cards[3].parentElement.className = 'summary-card remaining' + (c.remaining < 0 ? ' negative' : '');
  }
  saveToCloud();
}

function deleteItemDirect(type, idx) {
  getMonth()[type].splice(idx, 1);
  saveToCloud();
  renderMain();
}

// ── Modal edit ──
let _editCtx = null;
function editItem(type, idx) {
  const item = getMonth()[type][idx];
  _editCtx = { type, idx };
  document.getElementById('modalTitle').textContent = 'Edit: ' + item.name;
  document.getElementById('modalBody').innerHTML = `
    <label>Name</label>
    <input id="editName" value="${item.name}" placeholder="Item name">
    <label>Amount (R)</label>
    <input id="editAmount" type="number" min="0" step="0.01" value="${item.amount || ''}" placeholder="0.00">
  `;
  document.getElementById('modalBtns').innerHTML = `
    <button class="btn btn-danger" onclick="deleteItem()">Delete</button>
    <button class="btn btn-ghost"  onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveItem()">Save</button>
  `;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('editAmount').focus(), 50);
}

function saveItem() {
  const { type, idx } = _editCtx;
  getMonth()[type][idx].name   = document.getElementById('editName').value.trim() || getMonth()[type][idx].name;
  getMonth()[type][idx].amount = parseFloat(document.getElementById('editAmount').value) || 0;
  closeModal();
  saveToCloud();
  renderMain();
}

function deleteItem() {
  const { type, idx } = _editCtx;
  getMonth()[type].splice(idx, 1);
  closeModal();
  saveToCloud();
  renderMain();
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── Export CSV ──
function exportCSV() {
  const rows = [['Month','Income','OwnersPay','OpEx','Tax','Profit','FixedExp','VariableExp','Remaining']];
  for (let m = 0; m < 12; m++) {
    const c = calc(state.months[m]);
    rows.push([MONTHS[m], c.income, c.owners, c.opex, c.tax, c.profit, c.fixedTotal, c.variableTotal, c.remaining]);
  }
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `MK_Budget_${YEAR}.csv`;
  a.click();
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) saveItem();
});

// ═══════════════════════════════════════════════════════
// BOOT — create Supabase table if needed, then load
// ═══════════════════════════════════════════════════════
loadFromCloud();
</script>
</body>
</html>
